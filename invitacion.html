  /* ============================================================
     TOKENS DE DISEÑO
     ============================================================ */
  :root{
    --black:#090909;
    --black-2:#0e0e14;
    --red:#C62828;
    --red-light:#E53935;
    --blue:#0D47A1;
    --blue-light:#1E6FE0;
    --white:#F5F5F5;
    --metal-a:#9aa0a6;
    --metal-b:#2b2d33;
    --glow-red: rgba(198,40,40,0.55);
    --glow-blue: rgba(13,71,161,0.55);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:var(--black); overflow:hidden; }
  body{
    position:relative;
    width:100%;
    min-height:100vh; min-height:100dvh;
    color:var(--white);
    font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    font-weight:300;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--red); color:var(--white); }

  @media (pointer:fine){
    body{ cursor:none; }
  }

  /* ============================================================
     CURSOR PERSONALIZADO
     ============================================================ */
  .cursor-dot,.cursor-ring{
    position:fixed; top:0; left:0;
    pointer-events:none; z-index:200;
    border-radius:50%;
    transform:translate(-50%,-50%);
  }
  .cursor-dot{
    width:6px; height:6px;
    background:var(--red-light);
    box-shadow:0 0 8px var(--red-light);
  }
  .cursor-ring{
    width:34px; height:34px;
    border:1px solid rgba(245,245,245,0.5);
    transition:width .25s ease, height .25s ease, border-color .25s ease, background .25s ease;
  }
  .cursor-ring.hover{
    width:56px; height:56px;
    border-color:var(--blue-light);
    background:rgba(13,71,161,0.12);
  }
  @media (pointer:coarse){
    .cursor-dot,.cursor-ring{ display:none; }
  }

  /* ============================================================
     FONDO — cielo, luna, niebla, skyline, lluvia, luces
     ============================================================ */
  #bg-canvas,#rain-canvas,#fx-canvas{
    position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none;
  }
  #fx-canvas{ z-index:60; }

  .sky{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(120% 70% at 50% -10%, #131b33 0%, transparent 60%),
      linear-gradient(180deg, var(--black-2) 0%, var(--black) 55%, #060608 100%);
  }

  #moon{
    position:fixed; top:8%; right:12%;
    width:clamp(60px,9vw,110px); height:clamp(60px,9vw,110px);
    border-radius:50%; z-index:1;
    background:radial-gradient(circle at 35% 30%, #fff 0%, #dfe6f2 35%, #aeb9cf 70%, #7c88a3 100%);
    box-shadow:0 0 60px 10px rgba(180,200,255,0.25), 0 0 120px 40px rgba(120,150,255,0.08);
    animation:moon-drift 40s ease-in-out infinite;
  }
  #moon::before,#moon::after{
    content:''; position:absolute; border-radius:50%; background:rgba(120,130,150,0.35);
  }
  #moon::before{ width:18%; height:18%; top:25%; left:20%; }
  #moon::after{ width:12%; height:12%; top:55%; left:55%; }
  @keyframes moon-drift{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(14px); } }

  .fog{
    position:fixed; left:-20%; width:140%; height:34vh; bottom:0; z-index:2;
    pointer-events:none; opacity:0.5; filter:blur(6px);
  }
  .fog-1{ background:radial-gradient(ellipse at 30% 100%, rgba(30,111,224,0.18), transparent 60%); animation:fog-drift 50s linear infinite; }
  .fog-2{ background:radial-gradient(ellipse at 70% 100%, rgba(245,245,245,0.08), transparent 60%); animation:fog-drift 65s linear infinite reverse; }
  @keyframes fog-drift{ 0%{ transform:translateX(-4%); } 50%{ transform:translateX(4%); } 100%{ transform:translateX(-4%); } }

  #skyline{
    position:fixed; left:0; right:0; bottom:0; height:36vh; z-index:3;
    display:flex; align-items:flex-end; pointer-events:none;
    filter:drop-shadow(0 0 30px rgba(13,71,161,0.15));
  }
  .building{
    align-self:flex-end;
    background:linear-gradient(180deg,#0d0d14,#040406);
    border-top:1px solid rgba(255,255,255,0.05);
    background-image:
      repeating-linear-gradient(0deg, transparent 0 10px, rgba(255,255,255,0.02) 10px 11px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0) 0 8px, var(--wcolor,rgba(198,40,40,.25)) 8px 9px, rgba(0,0,0,0) 9px 16px);
    background-blend-mode:screen;
  }

  .vignette{ position:fixed; inset:0; z-index:4; pointer-events:none; background:radial-gradient(120% 100% at 50% 40%, transparent 40%, rgba(0,0,0,0.7) 100%); }
  .grain{
    position:fixed; inset:0; z-index:5; pointer-events:none; opacity:0.045; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .corner-web{ position:fixed; width:min(26vw,200px); height:min(26vw,200px); z-index:6; pointer-events:none; opacity:0.3; transform-origin: top left; }
  .corner-web svg{ width:100%; height:100%; }
  .corner-web.tl{ top:-8px; left:-8px; }
  .corner-web.br{ bottom:-8px; right:-8px; transform:rotate(180deg); transform-origin:center; }

  /* letterbox cinematográfico */
  .letterbox{ position:fixed; left:0; right:0; height:9vh; background:#000; z-index:90; pointer-events:none; }
  .letterbox.top{ top:0; transform:translateY(-100%); }
  .letterbox.bottom{ bottom:0; transform:translateY(100%); }

  /* ============================================================
     MÚSICA
     ============================================================ */
  .music-btn{
    position:fixed; top:max(16px,env(safe-area-inset-top)); right:max(16px,env(safe-area-inset-right));
    z-index:100;
    background:rgba(9,9,9,0.55);
    border:1px solid rgba(245,245,245,0.18);
    color:var(--white);
    backdrop-filter:blur(10px);
    padding:10px 16px; border-radius:999px;
    font-size:0.78rem; letter-spacing:0.03em;
    cursor:pointer; display:flex; align-items:center; gap:8px;
    transition:border-color .25s ease, box-shadow .25s ease;
  }
  .music-btn:hover{ border-color:var(--red-light); box-shadow:0 0 18px var(--glow-red); }
  .music-btn .dot{ width:8px; height:8px; border-radius:50%; background:var(--blue-light); box-shadow:0 0 8px var(--blue-light); }
  .music-btn.playing .dot{ background:var(--red-light); box-shadow:0 0 10px var(--red-light); animation:pulse-dot 1.2s infinite ease-in-out; }
  @keyframes pulse-dot{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.5);} }

  /* ============================================================
     ESCENARIO / ESCENAS
     ============================================================ */
  .stage{ position:relative; z-index:10; height:100vh; height:100dvh; width:100%; overflow:hidden; }
  .scene{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px; opacity:0; visibility:hidden; pointer-events:none;
    overflow-y:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin; scrollbar-color:rgba(245,245,245,0.25) transparent;
  }
  .scene.active{ opacity:1; visibility:visible; pointer-events:auto; }
  .scene::-webkit-scrollbar{ width:6px; }
  .scene::-webkit-scrollbar-thumb{ background:rgba(245,245,245,0.2); border-radius:6px; }

  .t-line{ min-height:1.4em; }
  #line1{ font-size:clamp(0.7rem,2vw,0.9rem); letter-spacing:0.35em; text-transform:uppercase; color:var(--blue-light); margin-bottom:18px; }
  #line2{ font-family:'Bebas Neue',sans-serif; font-size:clamp(2.4rem,8.5vw,5rem); line-height:1.05; letter-spacing:0.02em;
    background:linear-gradient(180deg,#fff 10%,#cfd8f5 55%,var(--blue-light) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px var(--glow-red); margin-bottom:20px;
  }
  #line3{ width:100%; max-width:540px; font-size:clamp(0.95rem,2.3vw,1.1rem); color:rgba(245,245,245,0.82); line-height:1.6; margin:0 auto 34px; }

  .cursor-caret{ display:inline-block; width:2px; background:var(--red-light); margin-left:4px; height:0.9em; vertical-align:-0.1em; animation:blink 0.9s infinite; }
  @keyframes blink{ 0%,49%{opacity:1;} 50%,100%{opacity:0;} }

  .btn{
    font-family:inherit; font-weight:600; font-size:clamp(0.85rem,2.1vw,1rem);
    padding:16px 30px; border-radius:14px; border:none; cursor:pointer; letter-spacing:0.02em;
    -webkit-tap-highlight-color:transparent;
    transition:transform .2s ease, box-shadow .25s ease, background .3s ease, border-color .3s ease;
  }
  .btn-primary{
    position:relative; overflow:hidden;
    background:linear-gradient(135deg, var(--red) 0%, #8e1c1c 100%);
    color:var(--white);
    box-shadow:0 8px 26px var(--glow-red), inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .btn-primary::before{
    content:''; position:absolute; inset:0;
    background:linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    transform:translateX(-120%); transition:transform .6s ease;
  }
  .btn-primary:hover::before{ transform:translateX(120%); }
  .btn-primary:hover{ transform:translateY(-3px); box-shadow:0 14px 34px var(--glow-red); }

  .btn-ghost{
    background:rgba(245,245,245,0.05);
    color:var(--white);
    border:1px solid rgba(245,245,245,0.25);
    backdrop-filter:blur(6px);
  }
  .btn-ghost:hover{ border-color:var(--blue-light); box-shadow:0 0 22px var(--glow-blue); }
  #btn-no.dodging{ position:absolute; }
  #btn-no.caught{ background:rgba(198,40,40,0.14); border-color:var(--red-light); }

  #btn-continue{ opacity:0; pointer-events:none; }

  /* ---------- ESCENA MISIÓN (boleto) ---------- */
  #mission{ justify-content:flex-start; padding-top:clamp(16px,4vh,40px); gap:0; }

  .ticket-stage{ perspective:1200px; margin-bottom:22px; }
  .ticket-card{
    position:relative;
    width:min(52vw,220px);
    border-radius:20px;
    padding:8px;
    background:linear-gradient(160deg, var(--metal-a), var(--metal-b) 45%, var(--metal-a) 100%);
    box-shadow:
      0 25px 60px rgba(0,0,0,0.6),
      0 0 40px var(--glow-red),
      0 0 70px var(--glow-blue);
    animation:ticket-float 5s ease-in-out infinite;
    transform-style:preserve-3d;
  }
  @keyframes ticket-float{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-10px) rotate(0.4deg); } }

  .ticket-inner{
    position:relative; border-radius:14px; overflow:hidden;
    background:rgba(9,9,9,0.4); backdrop-filter:blur(4px);
    border:1px solid rgba(245,245,245,0.15);
  }
  .ticket-image-wrap{ position:relative; overflow:hidden; line-height:0; }
  .ticket-img{ width:100%; height:auto; display:block; }
  .ticket-shine{
    position:absolute; top:-20%; left:-60%; width:40%; height:140%;
    background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.35) 50%, transparent 80%);
    transform:skewX(-20deg);
    animation:shine-sweep 4.5s ease-in-out infinite;
    mix-blend-mode:screen;
  }
  @keyframes shine-sweep{ 0%,60%{ left:-60%; } 100%{ left:130%; } }

  .ticket-stamp{
    position:absolute; z-index:3;
    top:14%; left:50%;
    transform:translate(-50%,-50%) rotate(-14deg) scale(0.6);
    opacity:0;
    border:2px solid var(--red-light);
    border-radius:6px;
    padding:6px 10px;
    color:var(--red-light);
    font-size:clamp(0.55rem,1.6vw,0.72rem);
    font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
    text-align:center; line-height:1.25;
    background:rgba(9,9,9,0.35);
    box-shadow:0 0 18px var(--glow-red);
  }
  .ticket-stamp.stamp-2{
    border-color:var(--blue-light); color:#dce8ff;
    box-shadow:0 0 18px var(--glow-blue);
    top:auto; bottom:14%;
  }

  .ticket-divider{ position:relative; height:14px; background:transparent; }
  .ticket-divider::before{
    content:''; position:absolute; left:10px; right:10px; top:50%;
    border-top:2px dashed rgba(245,245,245,0.3);
  }
  .ticket-divider .notch{ position:absolute; width:16px; height:16px; border-radius:50%; background:var(--black); top:50%; transform:translateY(-50%); }
  .ticket-divider .notch.left{ left:-8px; }
  .ticket-divider .notch.right{ right:-8px; }

  .ticket-footer{ display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:6px 8px; padding:8px 12px 12px; }
  .ticket-code{ flex:1 1 auto; min-width:0; font-size:0.55rem; letter-spacing:0.08em; color:rgba(245,245,245,0.65); font-variant-numeric:tabular-nums; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ticket-barcode{
    flex:0 0 auto;
    width:56px; height:18px;
    background:repeating-linear-gradient(90deg, var(--white) 0 2px, transparent 2px 4px, var(--white) 4px 5px, transparent 5px 8px);
    opacity:0.7;
  }

  .mission-text{ width:100%; max-width:560px; margin:0 auto 8px; }
  #line4{ font-size:clamp(0.9rem,2.2vw,1.05rem); color:rgba(245,245,245,0.8); margin-bottom:10px; min-height:1.6em; }
  #line5{
    font-family:'Bebas Neue',sans-serif; font-weight:400;
    font-size:clamp(1.4rem,4.4vw,2.1rem); line-height:1.25; letter-spacing:0.01em;
    min-height:2.2em;
  }

  .btn-row{ position:relative; display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin-top:18px; min-height:70px; }
  /* los botones se apilan solos en cuanto no caben uno junto al otro:
     no depende de un ancho de pantalla exacto, sino del espacio real
     disponible (a prueba de navegadores/WebViews que no respeten
     bien el viewport). */
  .btn-row .btn{ flex:1 1 220px; }

  /* ---------- BLOQUE FINAL ---------- */
  .final-block{ opacity:0; width:100%; margin:20px auto 0; max-width:560px; }
  #line6,#line7{ font-size:clamp(0.95rem,2.3vw,1.1rem); color:rgba(245,245,245,0.85); margin-bottom:8px; min-height:1.6em; }

  .glass-card{
    margin-top:20px; padding:clamp(20px,4vw,30px); border-radius:20px;
    background:rgba(20,20,28,0.45);
    border:1px solid rgba(245,245,245,0.15);
    backdrop-filter:blur(14px);
    box-shadow:0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--glow-blue);
  }
  .glass-card p{ font-size:clamp(1rem,2.6vw,1.25rem); line-height:1.5; margin-bottom:20px; min-height:2.2em; }

  /* ---------- CIERRE ---------- */
  .closing-overlay{
    position:fixed; inset:0; z-index:95; display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; padding:24px; text-align:center;
    background:radial-gradient(120% 100% at 50% 50%, rgba(9,9,9,0.88) 0%, rgba(9,9,9,0.97) 70%);
    backdrop-filter:blur(3px);
  }
  .closing-overlay p{
    font-family:'Bebas Neue',sans-serif; font-size:clamp(1.8rem,6vw,3.2rem);
    background:linear-gradient(180deg,#fff,#ffd9d9 40%,var(--red-light) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    max-width:720px;
  }

  /* ============================================================
     RESPONSIVE — móviles muy pequeños, teléfonos, tablets,
     landscape corto, pantallas grandes y áreas seguras (notch).
     ============================================================ */

  /* áreas seguras globales (notch / gestos), en todos los tamaños */
  .stage{ padding-bottom:env(safe-area-inset-bottom); }
  .music-btn{ min-height:40px; }

  /* --- tablets y móviles grandes (≤768px) --- */
  @media (max-width:768px){
    .scene{ padding:22px; }
    .ticket-card{ width:min(58vw,240px); }
    .btn-row{ gap:12px; }
    .btn{ padding:14px 24px; }
  }

  /* --- teléfonos (≤480px) --- */
  @media (max-width:480px){
    .scene{ padding:18px; }
    .btn-row{ flex-direction:column; align-items:stretch; }
    .btn{ width:100%; }
    .music-btn{ font-size:0.7rem; padding:9px 14px; }
    .ticket-card{ width:64vw; }
    #moon{ top:6%; right:8%; }
    .corner-web{ width:min(34vw,150px); height:min(34vw,150px); opacity:0.22; }
  }

  /* --- teléfonos muy pequeños / pantalla de cover en plegables (≤360px) --- */
  @media (max-width:360px){
    .scene{ padding:14px; }
    .ticket-card{ width:72vw; }
    #line2{ font-size:clamp(2rem,10vw,2.6rem); }
    .ticket-code{ font-size:0.5rem; }
    .ticket-barcode{ width:42px; }
    .glass-card{ padding:18px; }
  }

  /* --- móviles/tablets en horizontal con poca altura --- */
  @media (max-height:520px) and (orientation:landscape){
    .scene{ padding:14px 28px; justify-content:flex-start; }
    #mission{ padding-top:10px; }
    .ticket-stage{ margin-bottom:12px; }
    .ticket-card{ width:min(22vh,150px); animation:none; }
    #moon{ width:44px; height:44px; top:6%; }
    .fog{ height:22vh; }
    #skyline{ height:22vh; }
    .mission-text,.final-block{ margin-top:10px; margin-bottom:4px; }
    .glass-card{ padding:16px; margin-top:12px; }
    .btn{ padding:12px 22px; }
    .letterbox{ height:6vh; }
  }

  /* --- pantallas grandes / 4K: el boleto puede respirar un poco más --- */
  @media (min-width:1600px){
    .ticket-card{ width:min(24vw,270px); }
    .mission-text,.final-block{ max-width:640px; }
  }

  /* --- pantallas táctiles: sin hover ni cursor fino, aseguremos áreas de toque --- */
  @media (hover:none){
    .btn{ padding:16px 28px; }
    .music-btn{ padding:12px 16px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }
</style>

<body>

  <!-- ===== CURSOR ===== -->
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <!-- ===== FONDO ===== -->
  <div class="sky"></div>

  <div class="corner-web tl parallax-layer" data-depth="0.1">
    <svg viewBox="0 0 200 200" fill="none" stroke="rgba(245,245,245,0.5)" stroke-width="1">
      <path d="M0,0 L200,60 M0,0 L140,200 M0,0 L200,0 M0,0 L0,200"/>
      <path d="M0,0 Q40,10 60,50 Q75,90 40,130"/>

  <div class="corner-web br parallax-layer" data-depth="0.1">
    <svg viewBox="0 0 200 200" fill="none" stroke="rgba(245,245,245,0.5)" stroke-width="1">
      <path d="M0,0 L200,60 M0,0 L140,200 M0,0 L200,0 M0,0 L0,200"/>
      <path d="M0,0 Q40,10 60,50 Q75,90 40,130"/>
      <path d="M0,0 Q60,15 110,40 Q150,60 170,100"/>

  <canvas id="fx-canvas"></canvas>

  <!--
    Música propia: si existe "musica.mp3" (o "musica.ogg") junto a este

  <audio id="bg-music" loop preload="none">

  <main class="stage">

    <!-- ===== ESCENA 1 — TRANSMISIÓN ===== -->

    <section id="mission" class="scene">

      <div class="ticket-stage">

            </div>

  </main>

  <div class="closing-overlay" id="closing-overlay">

  <!-- GSAP vía CDN para las secuencias cinematográficas -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
  (function(){
    "use strict";

    var gsapReady = (typeof gsap !== 'undefined');

    /* to(): envoltorio de gsap.to() con una alternativa que aplica el
       estado final al instante (sin animar) si GSAP no cargó — así la
       experiencia nunca se queda "atascada" sin conexión a internet. */
    function to(target, vars){
      if (gsapReady) return gsap.to(target, vars);
      var delay = (vars.delay || 0) * 1000;
      setTimeout(function(){
        if (!target) return;
        if ('opacity' in vars) target.style.opacity = vars.opacity;
        if ('left' in vars) target.style.left = (vars.left === '' ? '' : vars.left + 'px');
        if ('top' in vars) target.style.top = (vars.top === '' ? '' : vars.top + 'px');
        if ('y' in vars && typeof vars.y === 'string') target.style.transform = 'translateY(' + vars.y + ')';
        if (vars.onComplete) vars.onComplete();
      }, delay);
    }
    function set(target, vars){ if(gsapReady){ gsap.set(target, vars); } else if(target && target.style && 'opacity' in vars){ target.style.opacity = vars.opacity; } }
    /* qTo(): usado solo para el parallax decorativo; sin GSAP simplemente no aplica (no rompe nada). */
    function qTo(target, prop, vars){ return gsapReady ? gsap.quickTo(target, prop, vars) : function(){}; }

    /* ============================================================
       CURSOR PERSONALIZADO — punto rígido + anillo con retardo.
       Implementado con requestAnimationFrame puro (no depende de
       GSAP) para que nunca se quede clavado si el CDN no carga.
       ============================================================ */
    var cursorDot = document.getElementById('cursor-dot');
    var cursorRing = document.getElementById('cursor-ring');
    var mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
    var ringXpos = mouseX, ringYpos = mouseY;

    document.addEventListener('mousemove', function(e){
      mouseX = e.clientX; mouseY = e.clientY;
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';
    });
    (function cursorLoop(){
      ringXpos += (mouseX - ringXpos) * 0.18;
      ringYpos += (mouseY - ringYpos) * 0.18;
      cursorRing.style.left = ringXpos + 'px';
      cursorRing.style.top = ringYpos + 'px';
      requestAnimationFrame(cursorLoop);
    })();
    document.querySelectorAll('.btn, .ticket-card, .music-btn').forEach(function(el){
      el.addEventListener('mouseenter', function(){ cursorRing.classList.add('hover'); });
      el.addEventListener('mouseleave', function(){ cursorRing.classList.remove('hover'); });
    });

    /* ============================================================
       PARALLAX — capas de fondo reaccionan al mouse / giroscopio
       ============================================================ */
    var parallaxLayers = Array.prototype.slice.call(document.querySelectorAll('.parallax-layer'));
    var parallaxSetters = parallaxLayers.map(function(el){
      return { x: qTo(el,'x',{duration:0.8,ease:'power3.out'}), y: qTo(el,'y',{duration:0.8,ease:'power3.out'}), depth: parseFloat(el.dataset.depth)||0.1 };
    });
    function applyParallax(nx, ny){
      parallaxSetters.forEach(function(p){ p.x(nx * 40 * p.depth); p.y(ny * 24 * p.depth); });
    }
    window.addEventListener('mousemove', function(e){
      var nx = (e.clientX / window.innerWidth) - 0.5;
      var ny = (e.clientY / window.innerHeight) - 0.5;
      applyParallax(nx, ny);
    });
    window.addEventListener('deviceorientation', function(e){
      if (e.gamma == null) return;
      var nx = Math.max(-1, Math.min(1, e.gamma / 30));
      var ny = Math.max(-1, Math.min(1, (e.beta-45) / 30));
      applyParallax(nx, ny);
    });

    /* ligero balanceo de las telarañas de esquina */
    if (gsapReady){
      gsap.to('.corner-web.tl', { rotation:2, duration:4, yoyo:true, repeat:-1, ease:'sine.inOut' });
      gsap.to('.corner-web.br', { rotation:182, duration:4.5, yoyo:true, repeat:-1, ease:'sine.inOut' });
    }

    /* ============================================================
       SKYLINE GENERATIVO
       ============================================================ */
    function buildSkyline(){
      var container = document.getElementById('skyline');
      container.innerHTML = '';
      var w = window.innerWidth;
      var count = w < 480 ? 14 : (w < 900 ? 20 : 30);
      for (var i = 0; i < count; i++){
        var b = document.createElement('div');
        b.className = 'building';
        var h = 25 + Math.random() * 75;
        b.style.height = h + '%';
        b.style.width = (100 / count) + '%';
        b.style.setProperty('--wcolor', Math.random() > 0.5 ? 'rgba(198,40,40,.28)' : 'rgba(13,71,161,.32)');
        container.appendChild(b);
      }
    }
    buildSkyline();
    var resizeTimer;
    window.addEventListener('resize', function(){ clearTimeout(resizeTimer); resizeTimer = setTimeout(buildSkyline, 250); });

    /* ============================================================
       CANVAS DE FONDO — luces de ciudad titilando + hilos de telaraña
       ============================================================ */
    var bgCanvas = document.getElementById('bg-canvas');
    var bgCtx = bgCanvas.getContext('2d');
    var lightPoints = [];

    function resizeBg(){
      bgCanvas.width = window.innerWidth * devicePixelRatio;
      bgCanvas.height = window.innerHeight * devicePixelRatio;
      bgCanvas.style.width = window.innerWidth + 'px';
      bgCanvas.style.height = window.innerHeight + 'px';
      bgCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
      initLights();
    }
    function initLights(){
      var count = Math.min(60, Math.floor(window.innerWidth / 28));
      lightPoints = [];
      for (var i = 0; i < count; i++){
        lightPoints.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight * 0.75,
          phase: Math.random() * Math.PI * 2,
          speed: 0.4 + Math.random() * 0.8,
          r: 1 + Math.random() * 1.6,
          color: Math.random() > 0.5 ? '198,40,40' : '30,111,224'
        });
      }
    }
    var tBg = 0;
    function drawBg(){
      tBg += 0.016;
      var W = window.innerWidth, H = window.innerHeight;
      bgCtx.clearRect(0,0,W,H);
      for (var i = 0; i < lightPoints.length; i++){
        for (var j = i+1; j < lightPoints.length; j++){
          var dx = lightPoints[i].x - lightPoints[j].x;
          var dy = lightPoints[i].y - lightPoints[j].y;
          var dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 150){
            var op = (1 - dist/150) * 0.1;
            bgCtx.strokeStyle = 'rgba(210,216,255,' + op + ')';
            bgCtx.lineWidth = 1;
            bgCtx.beginPath();
            bgCtx.moveTo(lightPoints[i].x, lightPoints[i].y);
            bgCtx.lineTo(lightPoints[j].x, lightPoints[j].y);
            bgCtx.stroke();
          }
        }
      }
      for (var k = 0; k < lightPoints.length; k++){
        var p = lightPoints[k];
        var tw = 0.4 + 0.6 * Math.abs(Math.sin(tBg * p.speed + p.phase));
        bgCtx.beginPath();
        bgCtx.fillStyle = 'rgba(' + p.color + ',' + (tw*0.9) + ')';
        bgCtx.shadowColor = 'rgba(' + p.color + ',0.8)';
        bgCtx.shadowBlur = 6;
        bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        bgCtx.fill();
      }
      bgCtx.shadowBlur = 0;
      requestAnimationFrame(drawBg);
    }
    resizeBg();
    window.addEventListener('resize', resizeBg);
    requestAnimationFrame(drawBg);

    /* ============================================================
       LLUVIA LIGERA
       ============================================================ */
    var rainCanvas = document.getElementById('rain-canvas');
    var rainCtx = rainCanvas.getContext('2d');
    var drops = [];
    function resizeRain(){
      rainCanvas.width = window.innerWidth * devicePixelRatio;
      rainCanvas.height = window.innerHeight * devicePixelRatio;
      rainCanvas.style.width = window.innerWidth + 'px';
      rainCanvas.style.height = window.innerHeight + 'px';
      rainCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
      var count = Math.min(70, Math.floor(window.innerWidth / 22));
      drops = [];
      for (var i = 0; i < count; i++){
        drops.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          len: 8 + Math.random() * 14,
          speed: 3 + Math.random() * 3,
          drift: 0.6
        });
      }
    }
    function drawRain(){
      var W = window.innerWidth, H = window.innerHeight;
      rainCtx.clearRect(0,0,W,H);
      rainCtx.strokeStyle = 'rgba(210,220,255,0.18)';
      rainCtx.lineWidth = 1;
      drops.forEach(function(d){
        rainCtx.beginPath();
        rainCtx.moveTo(d.x, d.y);
        rainCtx.lineTo(d.x - d.drift*3, d.y + d.len);
        rainCtx.stroke();
        d.y += d.speed; d.x -= d.drift;
        if (d.y > H){ d.y = -20; d.x = Math.random() * W; }
      });
      requestAnimationFrame(drawRain);
    }
    resizeRain();
    window.addEventListener('resize', resizeRain);
    requestAnimationFrame(drawRain);

    /* ============================================================
       EFECTO MÁQUINA DE ESCRIBIR
       ============================================================ */
    function typeWrite(el, text, speed, onDone){
      el.textContent = '';
      var caret = document.createElement('span');
      caret.className = 'cursor-caret';
      var textNode = document.createTextNode('');
      el.appendChild(textNode);
      el.appendChild(caret);
      var i = 0;
      (function step(){
        if (i <= text.length){
          textNode.textContent = text.slice(0, i);
          i++;
          setTimeout(step, speed);
        } else {
          if (caret.parentNode) caret.parentNode.removeChild(caret);
          if (onDone) onDone();
        }
      })();
    }

    /* ============================================================
       AUDIO — música propia + efectos sintetizados
       ============================================================ */
    var audioCtx = null;
    function ctx(){
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    /* Blip corto y suave para micro-interacciones, sin necesitar archivos */
    function playBlip(freq, dur, type, vol){
      var c = ctx();
      var osc = c.createOscillator();
      var gain = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      gain.gain.value = 0;
      osc.connect(gain).connect(c.destination);
      var now = c.currentTime;
      gain.gain.linearRampToValueAtTime(vol||0.06, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.start(now);
      osc.stop(now + dur + 0.05);
    }

    var fileAudio = document.getElementById('bg-music');
    var musicBtn = document.getElementById('music-toggle');
    var musicLabel = document.getElementById('music-label');
    var playing = false;

    musicBtn.addEventListener('click', function(){
      playing = !playing;
      musicBtn.classList.toggle('playing', playing);
      musicBtn.setAttribute('aria-label', playing ? 'Silenciar música' : 'Activar música');
      musicLabel.textContent = playing ? 'Sonando' : 'Música';
      if (playing){
        fileAudio.play().catch(function(){ /* sin archivo: la experiencia queda en silencio */ });
      } else {
        fileAudio.pause();
      }
    });

    /* ============================================================
       ESCENA 1 — SECUENCIA DE APERTURA
       ============================================================ */
    var btnContinue = document.getElementById('btn-continue');

    typeWrite(document.getElementById('line1'), 'Transmisión entrante...', 45, function(){
      setTimeout(function(){
        typeWrite(document.getElementById('line2'), 'Tengo una misión muy importante para ti.', 42, function(){
          setTimeout(function(){
            typeWrite(document.getElementById('line3'), 'Pero antes necesito saber si aceptas recibirla.', 28, function(){
              to(btnContinue, { opacity:1, duration:0.6, onComplete:function(){ btnContinue.style.pointerEvents='auto'; } });
            });
          }, 350);
        });
      }, 350);
    });

    btnContinue.addEventListener('click', function(){
      playBlip(180, 0.5, 'sine', 0.05);
      var intro = document.getElementById('intro');
      var mission = document.getElementById('mission');

      var tl = gsapReady ? gsap.timeline() : null;
      if (tl){
        tl.to('.stage', { scale:1.06, filter:'blur(6px)', duration:0.5, ease:'power2.in' })
          .add(function(){
            intro.classList.remove('active');
            mission.classList.add('active');
          })
          .to('.stage', { scale:1, filter:'blur(0px)', duration:0.6, ease:'power2.out' })
          .call(startMissionText);
      } else {
        intro.classList.remove('active');
        mission.classList.add('active');
        startMissionText();
      }
    });

    /* ============================================================
       ESCENA 2 — BOLETO + PREGUNTA
       ============================================================ */
    var missionStarted = false;
    function startMissionText(){
      if (missionStarted) return;
      missionStarted = true;

      var stamp1 = document.getElementById('stamp-1');
      to(stamp1, { opacity:1, scale:1, duration:0.5, delay:0.3, ease:'back.out(2.5)' });

      setTimeout(function(){
        typeWrite(document.getElementById('line4'), 'Has sido seleccionada para una misión exclusiva.', 26, function(){
          setTimeout(function(){
            typeWrite(document.getElementById('line5'), '¿Aceptarías acompañarme a ver Spider-Man: Un Nuevo Comienzo?', 26);
          }, 300);
        });
      }, 500);
    }

    /* ---- botón "Necesito pensarlo": esquiva y siempre termina aceptando ---- */
    var btnYes = document.getElementById('btn-yes');
    var btnNo = document.getElementById('btn-no');
    var btnRow = document.getElementById('mission-buttons');
    var dodges = 0;
    var maxDodges = 4;

    function dodgeButton(){
      var rowRect = btnRow.getBoundingClientRect();
      var btnRect = btnNo.getBoundingClientRect();
      if (!btnNo.classList.contains('dodging')){
        btnNo.classList.add('dodging');
        btnNo.style.left = (btnRect.left - rowRect.left) + 'px';
        btnNo.style.top = (btnRect.top - rowRect.top) + 'px';
        void btnNo.offsetWidth;
      }
      var maxX = Math.max(rowRect.width - btnRect.width, 0);
      var maxY = Math.max(rowRect.height - btnRect.height, 0);
      var newX = Math.random() * maxX;
      var newY = Math.random() * maxY;
      if (gsapReady){
        gsap.to(btnNo, { left:newX, top:newY, rotation: (Math.random()*30-15), duration:0.4, ease:'back.out(1.7)' });
      } else {
        btnNo.style.left = newX + 'px'; btnNo.style.top = newY + 'px';
      }
      playBlip(320 + Math.random()*120, 0.15, 'square', 0.03);
    }
    function catchButton(){
      btnNo.classList.add('caught');
      btnNo.textContent = 'Está bien, acepto 😅';
      if (gsapReady) gsap.to(btnNo, { left:'', top:'', rotation:0, duration:0.4 });
      btnNo.classList.remove('dodging');
    }
    btnNo.addEventListener('pointerenter', function(e){
      if (e.pointerType === 'mouse' && dodges < maxDodges){
        dodges++; dodgeButton();
        if (dodges >= maxDodges) catchButton();
      }
    });
    btnNo.addEventListener('click', function(e){
      if (dodges < maxDodges){
        e.preventDefault();
        dodges++; dodgeButton();
        if (dodges >= maxDodges) catchButton();
        return;
      }
      triggerAccept();
    });
    btnYes.addEventListener('click', triggerAccept);

    /* ============================================================
       ACEPTACIÓN — sello, ráfaga de telaraña, confeti
       ============================================================ */
    var accepted = false;
    function triggerAccept(){
      if (accepted) return;
      accepted = true;
      playBlip(440, 0.4, 'triangle', 0.07);
      setTimeout(function(){ playBlip(660, 0.5, 'triangle', 0.07); }, 120);

      document.getElementById('mission-buttons').style.display = 'none';

      if (gsapReady){
        gsap.timeline()
          .to('.stage', { scale:1.05, duration:0.35, ease:'power2.in' })
          .to('.stage', { scale:1, duration:0.5, ease:'power2.out' });
      }

      runWebAndConfetti();

      var stamp1 = document.getElementById('stamp-1');
      var stamp2 = document.getElementById('stamp-2');
      to(stamp1, { opacity:0, scale:0.6, duration:0.3 });
      to(stamp2, { opacity:1, scale:1, duration:0.6, delay:0.4, ease:'back.out(2.5)' });

      var finalBlock = document.getElementById('final-block');
      to(finalBlock, { opacity:1, duration:0.4, delay:0.8 });

      setTimeout(function(){
        typeWrite(document.getElementById('line6'), 'Perfecto...', 40, function(){
          setTimeout(function(){
            typeWrite(document.getElementById('line7'), 'Parece que ahora tenemos una misión secundaria.', 26, function(){
              setTimeout(revealCoffeeCard, 400);
            });
          }, 300);
        });
      }, 1300);
    }

    function revealCoffeeCard(){
      var card = document.getElementById('coffee-card');
      to(card, { opacity:1, y:0, duration:0.6, ease:'power2.out' });
      typeWrite(document.getElementById('line8'), '¿Qué te parece si este viernes vamos primero por un café ☕ y después cumplimos nuestra misión viendo Spider-Man?', 20);
    }
    set(document.getElementById('coffee-card'), { opacity:0, y:20 });

    /* ---- cierre ---- */
    function closeExperience(message){
      playBlip(523, 0.6, 'sine', 0.08);
      setTimeout(function(){ playBlip(784, 0.7, 'sine', 0.08); }, 150);
      var overlay = document.getElementById('closing-overlay');
      var text = document.getElementById('closing-text');
      text.textContent = message;
      to(overlay, { opacity:1, duration:0.8, ease:'power2.out' });
      overlay.style.pointerEvents = 'auto';
      var letterboxTop = document.getElementById('letterbox-top');
      var letterboxBottom = document.getElementById('letterbox-bottom');
      to(letterboxTop, { y:'0%', duration:0.8, ease:'power2.inOut' });
      to(letterboxBottom, { y:'0%', duration:0.8, ease:'power2.inOut' });
      runWebAndConfetti(0.6);
    }
    document.getElementById('btn-coffee').addEventListener('click', function(){
      closeExperience('Cita confirmada — nos vemos el viernes 🕸️☕');
    });
    document.getElementById('btn-love').addEventListener('click', function(){
      closeExperience('Cita confirmada — nos vemos el viernes 🕸️❤️');
    });

    /* ============================================================
       CANVAS FX — ráfaga de telaraña + confeti rojo/azul/blanco
       ============================================================ */
    var fxCanvas = document.getElementById('fx-canvas');
    var fxCtx = fxCanvas.getContext('2d');

    function runWebAndConfetti(scale){
      scale = scale || 1;
      fxCanvas.width = window.innerWidth * devicePixelRatio;
      fxCanvas.height = window.innerHeight * devicePixelRatio;
      fxCanvas.style.width = window.innerWidth + 'px';
      fxCanvas.style.height = window.innerHeight + 'px';
      fxCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);

      var W = window.innerWidth, H = window.innerHeight;
      var cx = W/2, cy = H*0.38;
      var rays = 14;
      var start = null;
      var duration = 1200;
      var colors = ['198,40,40','13,71,161','245,245,245'];

      var confetti = [];
      var confettiCount = Math.floor(90 * scale);
      for (var i = 0; i < confettiCount; i++){
        confetti.push({
          x: cx + (Math.random()-0.5) * 200,
          y: cy + (Math.random()-0.5) * 100,
          vx: (Math.random()-0.5) * 8,
          vy: -Math.random() * 9 - 2,
          rot: Math.random() * Math.PI,
          vr: (Math.random()-0.5) * 0.3,
          size: 5 + Math.random() * 6,
          color: colors[Math.floor(Math.random()*colors.length)],
          life: 0,
          maxLife: 1800 + Math.random() * 1200
        });
      }

      function frame(ts){
        if (!start) start = ts;
        var elapsed = ts - start;
        var progress = Math.min(elapsed / duration, 1);
        var eased = 1 - Math.pow(1-progress, 3);

        fxCtx.clearRect(0,0,W,H);

        /* rayos de telaraña radiando desde el centro */
        fxCtx.strokeStyle = 'rgba(245,245,245,0.5)';
        fxCtx.lineWidth = 1.2;
        var maxLen = Math.max(W,H) * 0.6 * eased * scale;
        for (var r = 0; r < rays; r++){
          var angle = (Math.PI*2/rays) * r;
          fxCtx.beginPath();
          fxCtx.moveTo(cx, cy);
          fxCtx.lineTo(cx + Math.cos(angle)*maxLen, cy + Math.sin(angle)*maxLen);
          fxCtx.stroke();
        }
        var rings = 4;
        for (var rr = 1; rr <= rings; rr++){
          var ringR = (maxLen/rings) * rr;
          fxCtx.beginPath();
          for (var a = 0; a <= rays; a++){
            var ang = (Math.PI*2/rays) * a;
            var px = cx + Math.cos(ang)*ringR;
            var py = cy + Math.sin(ang)*ringR;
            if (a === 0) fxCtx.moveTo(px,py); else fxCtx.lineTo(px,py);
          }
          fxCtx.strokeStyle = 'rgba(210,220,255,' + (0.3 * (1-rr/rings)) + ')';
          fxCtx.stroke();
        }

        /* confeti cayendo con gravedad y rotación */
        confetti.forEach(function(p){
          p.life += 16;
          p.x += p.vx * 0.4;
          p.y += p.vy * 0.4;
          p.vy += 0.15;
          p.rot += p.vr;
          var lifeProg = Math.min(p.life / p.maxLife, 1);
          fxCtx.save();
          fxCtx.translate(p.x, p.y);
          fxCtx.rotate(p.rot);
          fxCtx.globalAlpha = 1 - lifeProg;
          fxCtx.fillStyle = 'rgba(' + p.color + ',0.9)';
          fxCtx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.6);
          fxCtx.restore();
        });

        var stillAlive = confetti.some(function(p){ return p.life < p.maxLife; });
        if (progress < 1 || stillAlive){
          requestAnimationFrame(frame);
        } else {
          fxCtx.clearRect(0,0,W,H);
        }
      }
      requestAnimationFrame(frame);
    }

  })();
  </script>
</body>
</html>
